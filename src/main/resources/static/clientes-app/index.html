<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Clientes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-4">
    <h1 class="mb-4 text-center">Gestión de Clientes</h1>

    <div class="card p-3 mb-3">
        <h4>Agregar Cliente</h4>
        <form id="clienteForm">
            <div class="row mb-3">
                <div class="col"><input type="text" id="nombre" class="form-control" placeholder="Nombre" required></div>
                <div class="col"><input type="text" id="dni" class="form-control" placeholder="DNI" required></div>
                <div class="col"><input type="text" id="direccion" class="form-control" placeholder="Dirección"></div>
                <div class="col"><input type="text" id="telefono" class="form-control" placeholder="Teléfono"></div>
            </div>
            <button type="submit" class="btn btn-primary">Guardar</button>
        </form>
    </div>

    <h4>Lista de Clientes</h4>
    <table class="table table-striped" id="tablaClientes">
        <thead>
            <tr>
                <th>ID</th><th>Nombre</th><th>DNI</th><th>Dirección</th><th>Teléfono</th><th>Acciones</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
const API_URL = "http://localhost:8080/api/cliente";

async function listarClientes() {
    const res = await fetch(API_URL + "/listar");
    const data = await res.json();
    const tbody = document.querySelector("#tablaClientes tbody");
    tbody.innerHTML = "";
    data.forEach(c => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
            <td>${c.id}</td>
            <td>${c.nombre}</td>
            <td>${c.dni}</td>
            <td>${c.direccion}</td>
            <td>${c.telefono}</td>
            <td>
                <button class="btn btn-sm btn-danger" onclick="eliminarCliente(${c.id})">🗑️</button>
            </td>
        `;
        tbody.appendChild(tr);
    });
}

document.getElementById("clienteForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    const cliente = {
        nombre: nombre.value,
        dni: dni.value,
        direccion: direccion.value,
        telefono: telefono.value,
        fechaCreacion: new Date().toISOString()
    };
    await fetch(API_URL, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify(cliente)
    });
    e.target.reset();
    listarClientes();
});

async function eliminarCliente(id) {
    await fetch(API_URL + "/" + id, { method: "DELETE" });
    listarClientes();
}

listarClientes();
</script>
</body>
</html>
