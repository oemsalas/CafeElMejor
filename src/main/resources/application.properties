# ── Base de datos H2 embebida (persistente en archivo) ──
spring.datasource.url=jdbc:h2:file:./cafedemo-data;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Pool liviano con commons-dbcp2
spring.datasource.type=org.apache.commons.dbcp2.BasicDataSource
spring.datasource.dbcp2.max-total=5
spring.datasource.dbcp2.max-idle=3
spring.datasource.dbcp2.min-idle=1

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=false

# ── Carga del data.sql ──
# Con ddl-auto=update Spring Boot no ejecuta data.sql por defecto, hay que forzarlo
spring.sql.init.mode=always
spring.sql.init.data-locations=classpath:data.sql
# Importante: JPA crea las tablas ANTES de ejecutar el data.sql
spring.jpa.defer-datasource-initialization=true

# Desactivar estadísticas de Hibernate (ahorra memoria)
spring.jpa.properties.hibernate.generate_statistics=false
spring.jpa.properties.hibernate.cache.use_second_level_cache=false
spring.jpa.properties.hibernate.cache.use_query_cache=false

# Undertow: reducir threads al mínimo para la Pi
server.port=8080
server.undertow.threads.io=2
server.undertow.threads.worker=8

# Reducir logs al mínimo
logging.level.root=WARN
logging.level.com.cafe=WARN
logging.level.org.hibernate=WARN
logging.level.org.springframework=WARN

# Desactivar banner y JMX (ahorran memoria al arrancar)
spring.main.banner-mode=off
spring.jmx.enabled=false

# Desactivar autoconfiguraciones innecesarias
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.admin.SpringApplicationAdminJmxAutoConfiguration,\
  org.springframework.boot.autoconfigure.jmx.JmxAutoConfiguration
