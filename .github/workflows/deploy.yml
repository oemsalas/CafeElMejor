name: CI/CD — CaféDemo

on:
  push:
    branches: [ main ]
  workflow_dispatch:        # permite correrlo manualmente desde GitHub

jobs:

  # ── JOB 1: Build y test del backend ──────────────────────────────
  build:
    name: Build Spring Boot
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Compilar y empaquetar
        run: mvn clean package -DskipTests

      # Guarda el JAR como artefacto para el siguiente job
      - name: Subir JAR como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: cafedemo-jar
          path: target/cafeDemo-0.0.1-SNAPSHOT.jar
          retention-days: 1

  # ── JOB 2: Deploy a la Raspberry Pi ──────────────────────────────
  deploy:
    name: Deploy a Raspberry Pi
    runs-on: ubuntu-latest
    needs: build              # solo corre si el build pasó

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Descargar JAR del artefacto
        uses: actions/download-artifact@v4
        with:
          name: cafedemo-jar
          path: target/

      - name: Configurar SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.RPI_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.RPI_PORT }} ${{ secrets.RPI_HOST }} >> ~/.ssh/known_hosts

      - name: Copiar JAR a la Raspberry
        run: |
          scp -i ~/.ssh/deploy_key \
              -P ${{ secrets.RPI_PORT }} \
              target/cafeDemo-0.0.1-SNAPSHOT.jar \
              ${{ secrets.RPI_USER }}@${{ secrets.RPI_HOST }}:~/cafedemo/cafeDemo-0.0.1-SNAPSHOT.jar
      
      - name: Reiniciar servicio en la Raspberry
        run: |
          ssh -i ~/.ssh/deploy_key \
              -p ${{ secrets.RPI_PORT }} \
              ${{ secrets.RPI_USER }}@${{ secrets.RPI_HOST }} \
              "sudo systemctl restart cafedemo"
